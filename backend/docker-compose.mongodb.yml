# One-command local MongoDB for development
# From this folder: docker compose -f docker-compose.mongodb.yml up -d
# URI: mongodb://127.0.0.1:27017/agrisupply (matches .env.example)

services:
  mongodb:
    image: mongo:7
    container_name: agrisupply-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - agrisupply_mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: agrisupply

volumes:
  agrisupply_mongo_data:
